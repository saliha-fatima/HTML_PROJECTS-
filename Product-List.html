<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 20px;
        }

        h2 {
            color: #333;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #product-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product-card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .product-card p {
            font-size: 16px;
            color: #555;
            margin: 5px 0;
        }

        .product-card strong {
            color: #000;
        }
    </style>
</head>
<body>

    <h2>Product List</h2>
    <button onclick="fetchProducts()">Load Products</button>
    <div id="product-list"></div>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('https://fakestoreapi.com/products');
                const products = await response.json();

                document.getElementById("product-list").innerHTML = products.map(product => `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.title}">
                        <p><strong>${product.title}</strong></p>
                        <p>💲 ${product.price}</p>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById("product-list").innerHTML = `<p style="color: red;">Failed to fetch product data.</p>`;
                console.error("Error fetching product data:", error);
            }
        }
    </script>

</body>
</html>
