<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 20px;
        }

        h2 {
            color: #333;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #weather-info {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin: 20px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 2px 2px 15px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        #weather-info p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }

        #weather-info strong {
            color: #000;
        }
    </style>
</head>
<body>

    <h2>Weather Dashboard</h2>
    <button onclick="fetchWeatherData()">Get Weather</button>
    <div id="weather-info"></div>

    <script>
        async function fetchWeatherData() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35&longitude=139&hourly=temperature_2m');
                const data = await response.json();
                
                // Extracting the first hourly temperature as an example
                const temperature = data.hourly.temperature_2m[0];

                document.getElementById("weather-info").innerHTML = `
                    <p><strong>City:</strong> Tokyo (Latitude: 35, Longitude: 139)</p>
                    <p><strong>Current Temperature:</strong> ${temperature}°C</p>
                `;
            } catch (error) {
                document.getElementById("weather-info").innerHTML = `<p style="color: red;">Failed to fetch weather data.</p>`;
                console.error("Error fetching weather data:", error);
            }
        }
    </script>

</body>
</html>
