<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7eb3, #ff758c);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
            color: #333;
        }

        /* 🎨 Colorful Input Boxes 🎨 */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            transition: 0.3s;
        }

        /* Different colors for each input */
        #input1 { background-color: #ffebcc; }
        #input2 { background-color: #e6f7ff; }
        #input3 { background-color: #e8ffe8; }
        #numberInput { background-color: #f9f9b5; }
        #cnic { background-color: #ffe6f2; }

        /* Focus effect */
        input:focus {
            border-color: #007bff;
            background-color: #ffffff;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(to right, #007bff, #00c6ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: linear-gradient(to right, #00c6ff, #007bff);
            transform: scale(1.05);
        }

        /* Green color for success */
        .submit-success {
            background: linear-gradient(to right, #28a745, #34d058) !important;
        }

        .error {
            color: red;
            font-size: 13px;
            font-weight: bold;
            display: block;
            margin-top: 3px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Colorful Form Validation</h2>
        <form id="myForm">
            <label for="input1">Input 1:</label>
            <input type="text" id="input1">
            <span class="error" id="error1"></span>

            <label for="input2">Input 2:</label>
            <input type="text" id="input2">
            <span class="error" id="error2"></span>

            <label for="input3">Input 3:</label>
            <input type="text" id="input3">
            <span class="error" id="error3"></span>

            <label for="numberInput">Enter a number (1-10):</label>
            <input type="number" id="numberInput">
            <span class="error" id="error4"></span>

            <label for="cnic">Enter CNIC (13 digits without dashes):</label>
            <input type="text" id="cnic">
            <span class="error" id="error5"></span>

            <button type="button" class="submit-btn" id="submitBtn" onclick="validateForm()">Submit</button>
        </form>
    </div>

    <script>
        function validateForm() {
            let input1 = document.getElementById("input1").value.trim();
            let input2 = document.getElementById("input2").value.trim();
            let input3 = document.getElementById("input3").value.trim();
            let numberInput = document.getElementById("numberInput").value;
            let cnic = document.getElementById("cnic").value.trim();
            let submitBtn = document.getElementById("submitBtn");

            let isValid = true;

            // Clear previous errors
            document.getElementById("error1").textContent = "";
            document.getElementById("error2").textContent = "";
            document.getElementById("error3").textContent = "";
            document.getElementById("error4").textContent = "";
            document.getElementById("error5").textContent = "";

            if (input1 === "") {
                document.getElementById("error1").textContent = "Required!";
                isValid = false;
            }

            if (input2 === "") {
                document.getElementById("error2").textContent = "Required!";
                isValid = false;
            }

            if (input3 === "") {
                document.getElementById("error3").textContent = "Required!";
                isValid = false;
            }

            if (numberInput < 1 || numberInput > 10 || numberInput === "") {
                document.getElementById("error4").textContent = "Enter a number between 1-10!";
                isValid = false;
            }

            let cnicPattern = /^\d{13}$/;
            if (!cnicPattern.test(cnic)) {
                document.getElementById("error5").textContent = "Enter a valid 13-digit CNIC!";
                isValid = false;
            }

            if (isValid) {
                // Change button color to green on success
                submitBtn.classList.add("submit-success");
                alert("Form submitted successfully!");
            }
        }
    </script>

</body>
</html>
